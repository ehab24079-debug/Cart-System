<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstrap.css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- bootstrap.js -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!--font-awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Admin Page</title>
  </head>
  <body>
    <div class="container col-12 d-flex flex-column gap-3">
      <h3 class="mb-0 mt-3 fw-bold">Admin Page</h3>
      <button
        class="btn btn-dark col-6 col-md-3"
        data-bs-toggle="modal"
        data-bs-target="#NewProductModal"
      >
        Add New Item
      </button>
      <table class="table table-dark table-striped table-hover shadow table-bordered align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Item Name</th>
            <th>Item Price</th>
            <th>Item imgURL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Modal  -->
    <div
      class="modal fade"
      id="NewProductModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content p-4 gap-3">
          <h2>Add New Product</h2>
          <input
            class="form-control"
            id="PhoneNameInput"
            type="text"
            placeholder="Enter New Phone Name"
          />
          <input
            class="form-control"
            id="PhonePriceInput"
            type="number"
            placeholder="Enter New Phone Price"
          />
          <input
            class="form-control"
            id="PhoneImgInput"
            type="text"
            placeholder="Enter New Phone imgUrl"
          />
          <select class="form-control" id="phoneBrandSelect">
            <option hidden>Select Product Brand</option>
            <option value="Apple">Apple</option>
            <option value="Samsung">Samsung</option>
            <option value="Oppo">Oppo</option>
          </select>
          <div class="footer">
            <button type="button" class="btn btn-success" data-bs-dismiss="modal" onclick="AddNewProduct()">Save changes</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Modal Edit  -->
    <div
      class="modal fade"
      id="EditModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content p-4 gap-3">
          <h2>Edit Product</h2>
          <input
            class="form-control"
            id="PhoneNameInputEdit"
            type="text"
            placeholder="Enter New Phone Name"
          />
          <input
            class="form-control"
            id="PhonePriceInputEdit"
            type="number"
            placeholder="Enter New Phone Price"
          />
          <input
            class="form-control"
            id="PhoneImgInputEdit"
            type="text"
            placeholder="Enter New Phone imgUrl"
          />
          <select class="form-control" id="phoneBrandSelectEdit">
            <option hidden>Select Product Brand</option>
            <option value="Apple">Apple</option>
            <option value="Samsung">Samsung</option>
            <option value="Oppo">Oppo</option>
          </select>
          <div class="footer">
            <button type="button" class="btn btn-success" data-bs-dismiss="modal" onclick="SaveUpdate()">Save changes</button>
          </div>
        </div>
      </div>
    </div>
    <footer class="container d-flex justify-content-center gap-3 mt-2 p-3">
      <button class="btn btn-info"><a class="text-decoration-none text-white" href="./index.html">Cart Page</a></button>
    </footer>
    <script src="./data.js"></script>
    <script src="./Admin.js"></script>
  </body>
</html>
