<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstrap.css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- bootstrap.js -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!--font-awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Cart system</title>
  </head>
  <body>
    <header class="container d-flex justify-content-center gap-3 mt-2 p-3">
        <button class="btn btn-warning" onclick="Filterproducts('Apple')">
        Apple products
      </button>
      <button class="btn btn-warning" onclick="Filterproducts('Oppo')">
        Oppo products
      </button>
      <button class="btn btn-warning" onclick="Filterproducts('All')">
        Clear filter
      </button>
    </header>
    <main class="d-flex flex-column container">
      <!-- Cards -->
      <div class="Sec1 d-flex  container col-8 p-4 overflow-auto">
        <div class="row g-3" id="productsDiv"></div>
      </div>
      <!-- Button trigger modal -->


      <!-- Modal -->
      <div
        class="modal fade"
        id="AddCartModal"
        tabindex="-1"
        aria-labelledby="exampleModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
          <div class="col-12 p-4 overflow-auto">
        <div class=" border-s">
          <h1>Your cart</h1>
          <table class="table table-dark table-striped table-hover shadow table-bordered align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>Item Name</th>
                <th>Item Price</th>
                <th>Item Qty</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
              <tr>
                <td colspan="3">Total</td>
                <td colspan="2"><span id="TotalSpan"></span></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
              <!-- <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
              <button type="button" class="btn btn-primary">
                Save changes
              </button> -->
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="container d-flex justify-content-center gap-3 mt-2 p-3">
      <button class="btn btn-info"><a class="text-decoration-none text-white" target="_blank" href="./AdminPage.html">Admin Page</a></button>
    </footer>
    <script src="./data.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
